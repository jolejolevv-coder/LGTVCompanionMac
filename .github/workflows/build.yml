name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Package app bundle + DMG
        run: ./scripts/build-release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LGTVCompanion-dmg
          path: build/*.dmg

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.dmg
